<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolarOS v3.0 | All-Device Responsive</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00f2ff;
            --gold: #ffcc00;
            --dark: #0a0f1d;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Quicksand', sans-serif;
            background: radial-gradient(circle at bottom left, #0f172a, #020617);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Better for scrolling on mobile */
            padding: 15px;
        }

        /* Main Container: Grid for Desktop, Flex/Single Column for Mobile */
        .app-container {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 1fr; /* Mobile first */
            gap: 20px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            margin-top: 10px;
        }

        /* Desktop Layout (992px and up) */
        @media (min-width: 992px) {
            .app-container {
                grid-template-columns: 350px 1fr;
                padding: 25px;
                margin-top: 0;
                align-self: center;
            }
        }

        /* Control Panel */
        .controls {
            background: rgba(0,0,0,0.4);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(0,242,255,0.1);
        }

        h1 { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; color: var(--neon); margin-bottom: 25px; text-align: center; letter-spacing: 2px; }

        .field { margin-bottom: 20px; }
        label { display: block; font-size: 0.7rem; text-transform: uppercase; color: #888; margin-bottom: 6px; letter-spacing: 1px; }

        input, select {
            width: 100%;
            padding: 12px;
            background: #16213e;
            border: 1px solid #1f4068;
            border-radius: 10px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            outline: none;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--neon), #0066ff);
            border: none;
            border-radius: 12px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:active { transform: scale(0.98); }

        /* Dashboard & Stats Grid */
        .dashboard { padding: 5px; }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* 2 Columns on mobile */
            gap: 12px;
        }

        /* 3 Columns on Tablets/Desktop */
        @media (min-width: 600px) {
            .stats-grid { grid-template-columns: repeat(3, 1fr); }
        }

        .card {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }

        .card h4 { font-size: 0.6rem; color: #777; margin-bottom: 8px; text-transform: uppercase; }
        .card p { font-family: 'Orbitron', sans-serif; font-size: 1rem; color: white; word-wrap: break-word; }

        .science-box {
            margin-top: 20px;
            padding: 20px;
            background: rgba(0, 242, 255, 0.03);
            border-radius: 15px;
            border-left: 4px solid var(--neon);
        }

        .science-box h3 { font-family: 'Orbitron', sans-serif; font-size: 0.8rem; color: var(--neon); margin-bottom: 8px; }
        .science-box p { font-size: 0.8rem; line-height: 1.5; color: #bdc3c7; }

        .solar-icon {
            width: 70px;
            margin: 10px auto 20px;
            display: block;
            animation: rotate 12s infinite linear;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .material-badge {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(255, 204, 0, 0.1);
            border: 1px solid var(--gold);
            color: var(--gold);
            border-radius: 15px;
            font-size: 0.65rem;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="controls">
        <h1>SolarOS v3.0</h1>
        <div class="field">
            <label>Voltage Signature (V)</label>
            <input type="number" id="vIn" value="48" inputmode="numeric">
        </div>
        <div class="field">
            <label>Array Density (Units)</label>
            <input type="number" id="pIn" value="10" inputmode="numeric">
        </div>
        <div class="field">
            <label>Cell Substrate</label>
            <select id="mIn">
                <option value="p-type">P-Type Silicon (Standard)</option>
                <option value="n-type">N-Type TOPCon (Next-Gen)</option>
                <option value="perc">Mono-PERC (High Yield)</option>
            </select>
        </div>
        <button onclick="simulate()">Simulate Array</button>
    </div>

    <div class="dashboard">
        <img src="https://cdn-icons-png.flaticon.com/512/597/597177.png" class="solar-icon" alt="Solar Icon">
        
        <center><div id="materialTag" class="material-badge">Substrate: N-Type TOPCon</div></center>
        
        <div class="stats-grid">
            <div class="card">
                <h4>System Power</h4>
                <p id="outWatt">0.00 kW</p>
            </div>
            <div class="card">
                <h4>Roof Area</h4>
                <p id="outArea">0 ft²</p>
            </div>
            <div class="card">
                <h4>Unit Dims</h4>
                <p id="outDim" style="font-size: 0.8rem;">-</p>
            </div>
            <div class="card">
                <h4>Life</h4>
                <p id="outLife">0 Years</p>
            </div>
            <div class="card">
                <h4>Efficiency</h4>
                <p id="outEff">0%</p>
            </div>
            <div class="card">
                <h4>Battery</h4>
                <p id="outBatt">0 Units</p>
            </div>
        </div>

        <div class="science-box">
            <h3>Material Science Analysis</h3>
            <p id="outSci">Select parameters and click simulate to analyze.</p>
        </div>
    </div>
</div>

<script>
    function simulate() {
        const v = parseInt(document.getElementById('vIn').value) || 0;
        const count = parseInt(document.getElementById('pIn').value) || 0;
        const material = document.getElementById('mIn').value;

        let w, l, wid, ar, life, eff, sci;

        if (v <= 12) {
            w = 180; l = 4.8; wid = 2.2; ar = 10.5;
        } else if (v > 12 && v <= 24) {
            w = 460; l = 7.2; wid = 3.5; ar = 25.2;
        } else {
            w = 585; l = 7.8; wid = 3.8; ar = 29.6;
        }

        if (material === "p-type") {
            life = 25; eff = "19-21%";
            sci = "P-Type cells use boron-doped silicon. Reliable but prone to LID degradation.";
        } else if (material === "n-type") {
            w += 40; life = 30; eff = "22-25%";
            sci = "N-Type TOPCon uses phosphorus-doped silicon. Higher efficiency and zero LID.";
        } else {
            w += 20; life = 25; eff = "21-22.5%";
            sci = "Mono-PERC captures more light via reflective layers. Standard high-yield choice.";
        }

        document.getElementById('materialTag').innerText = "Substrate: " + material.toUpperCase();
        document.getElementById('outWatt').innerText = ((w * count) / 1000).toFixed(2) + " kW";
        document.getElementById('outArea').innerText = (ar * count).toFixed(1) + " ft²";
        document.getElementById('outDim').innerText = l + "ft x " + wid + "ft";
        document.getElementById('outLife').innerText = life + " Years";
        document.getElementById('outEff').innerText = eff;
        document.getElementById('outBatt').innerText = Math.ceil(v/12) + " x 12V Batteries";
        document.getElementById('outSci').innerText = sci;
    }
    simulate();
</script>

</body>
</html>
