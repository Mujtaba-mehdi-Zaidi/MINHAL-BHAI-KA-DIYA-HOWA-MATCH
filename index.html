<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SolarOS v4.0 | Wattage Dimension Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon: #00f2ff;
            --gold: #ffcc00;
            --glass: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Quicksand', sans-serif;
            background: radial-gradient(circle at center, #0f172a, #020617);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px 15px;
        }

        .app-container {
            width: 100%;
            max-width: 1000px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .header { text-align: center; margin-bottom: 30px; }
        h1 { font-family: 'Orbitron', sans-serif; color: var(--neon); font-size: 1.5rem; letter-spacing: 2px; }
        p.subtitle { font-size: 0.8rem; color: #888; margin-top: 5px; }

        .input-section {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 25px;
        }

        @media (min-width: 600px) {
            .input-section { grid-template-columns: 1fr 1fr; }
        }

        .field label { display: block; font-size: 0.7rem; color: var(--neon); margin-bottom: 8px; text-transform: uppercase; }
        
        input, select {
            width: 100%;
            padding: 15px;
            background: #16213e;
            border: 1px solid #1f4068;
            border-radius: 12px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            outline: none;
        }

        button {
            grid-column: 1 / -1;
            padding: 18px;
            background: linear-gradient(135deg, var(--neon), #0066ff);
            border: none;
            border-radius: 12px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        @media (min-width: 768px) { .result-grid { grid-template-columns: repeat(4, 1fr); } }

        .card {
            background: rgba(255,255,255,0.05);
            padding: 20px 10px;
            border-radius: 18px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .card h4 { font-size: 0.6rem; color: #aaa; margin-bottom: 10px; text-transform: uppercase; }
        .card p { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; color: #fff; }

        .info-box {
            margin-top: 25px;
            padding: 20px;
            background: rgba(0, 242, 255, 0.05);
            border-left: 4px solid var(--neon);
            border-radius: 12px;
        }

        .info-box h3 { font-family: 'Orbitron', sans-serif; font-size: 0.9rem; color: var(--neon); margin-bottom: 10px; }
        .info-box p { font-size: 0.85rem; line-height: 1.6; color: #ccc; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1>SolarOS v4.0</h1>
        <p class="subtitle">Wattage-to-Dimension Smart Engine</p>
    </div>

    <div class="input-section">
        <div class="field">
            <label>Panel Wattage (W)</label>
            <input type="number" id="wattIn" placeholder="e.g. 550" value="550">
        </div>
        <div class="field">
            <label>Technology</label>
            <select id="techIn">
                <option value="n-type">N-Type TOPCon</option>
                <option value="p-type">P-Type Mono</option>
            </select>
        </div>
        <button onclick="calculate()">Calculate Dimensions</button>
    </div>

    <div class="result-grid">
        <div class="card"><h4>Length</h4><p id="outL">-</p></div>
        <div class="card"><h4>Width</h4><p id="outW">-</p></div>
        <div class="card"><h4>Area (Sq.ft)</h4><p id="outA">-</p></div>
        <div class="card"><h4>Weight (kg)</h4><p id="outKg">-</p></div>
    </div>

    <div class="info-box">
        <h3>Technical Analysis</h3>
        <p id="outDesc">Enter panel wattage to see physical specifications and material insights.</p>
    </div>
</div>

<script>
    function calculate() {
        const watts = parseInt(document.getElementById('wattIn').value);
        const tech = document.getElementById('techIn').value;
        
        let length, width, weight, area, desc;

        // Realistic Industry Logic
        if (watts < 200) {
            length = 1480; width = 670; weight = 11;
            desc = "Chota panel (usually 12V systems). Ismein purani M6 cell technology use hoti hai.";
        } else if (watts >= 200 && watts < 400) {
            length = 1640; width = 992; weight = 19;
            desc = "Medium range panel. Residential rooftops ke liye munasib hai.";
        } else if (watts >= 400 && watts < 500) {
            length = 1722; width = 1134; weight = 21.5;
            desc = "Modern High-Efficiency panel. Ismein multi-busbar technology hoti hai.";
        } else if (watts >= 500 && watts < 600) {
            length = 2278; width = 1134; weight = 28.5;
            desc = "Utility Scale panel (Industrial). M10 cells ka istemal hota hai. Pakistan mein sabse zyada 550W isi size mein aate hain.";
        } else {
            length = 2384; width = 1303; weight = 34;
            desc = "Ultra-High Power (G12 cells). Ye kaafi bhari hote hain aur inke liye heavy structural framing chahiye hoti hai.";
        }

        // Material Science impact
        if (tech === 'n-type') {
            desc += " N-Type substrate ki wajah se ye panel dhoop mein kam garam hota hai aur zyada output deta hai.";
        }

        // Calculations
        area = ((length * width) / 92903).toFixed(2); // Convert mm2 to sq.ft

        // Display
        document.getElementById('outL').innerText = length + " mm";
        document.getElementById('outW').innerText = width + " mm";
        document.getElementById('outA').innerText = area;
        document.getElementById('outKg').innerText = weight;
        document.getElementById('outDesc').innerText = desc;
    }

    window.onload = calculate;
</script>

</body>
</html>
